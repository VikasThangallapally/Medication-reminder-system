<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="description" content="MediTrack medicine reminders with offline support and installable app experience." />
    <meta name="apple-mobile-web-app-capable" content="true" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MediTrack" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="MediTrack" />
    <meta name="msapplication-TileColor" content="#0f766e" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <title>MediTrack - Medicine Reminder</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#020617;color:#cffafe;font-family:Manrope,sans-serif;padding:16px;text-align:center;">
        <div>
          <div style="width:42px;height:42px;margin:0 auto 12px auto;border:3px solid rgba(34,211,238,.25);border-top-color:#22d3ee;border-radius:9999px;animation:spin .8s linear infinite;"></div>
          <p style="margin:0;font-size:14px;font-weight:600;letter-spacing:.02em;">Loading MediTrack...</p>
        </div>
      </div>
    </div>
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
